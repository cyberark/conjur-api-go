services:
  postgres:
    image: postgres:15
    environment:
      # To avoid the following error:
      #
      #   Error: Database is uninitialized and superuser password is not
      #   specified.  You must specify POSTGRES_PASSWORD for the superuser. Use
      #   "-e POSTGRES_PASSWORD=password" to set it in "docker run".
      #
      #   You may also use POSTGRES_HOST_AUTH_METHOD=trust to allow all
      #   connections without a password. This is *not* recommended. See
      #   PostgreSQL documentation about "trust"
      POSTGRES_HOST_AUTH_METHOD: trust

  conjur:
    image: ${REGISTRY_URL:-docker.io}/cyberark/conjur:edge
    command: server -a conjur
    environment:
      DATABASE_URL: postgres://postgres@postgres/postgres
      CONJUR_DATA_KEY:
      RAILS_ENV: development
      # Enable dynamic secrets for the Issuers API
      CONJUR_FEATURE_DYNAMIC_SECRETS_ENABLED: true
    depends_on:
      - postgres

  test-1.26:
    build:
      context: .
      args:
        FROM_IMAGE: "golang:1.26"
    ports:
      - 8080
    depends_on:
      - conjur
    volumes:
      - ./output:/conjur-api-go/output
    environment:
      CONJUR_DATA_KEY:
      CONJUR_APPLIANCE_URL: http://conjur
      CONJUR_ACCOUNT: conjur
      CONJUR_AUTHN_LOGIN: admin
      CONJUR_AUTHN_API_KEY:
      GO_VERSION:
    # Joined to the 'conjur' network so the container can resolve
    # conjur-leader-1.mycompany.local when cert tests are active.
    # The 'default' network entry keeps connectivity to the OSS conjur service.
    networks:
      - default
      - conjur

  test-1.25:
    build:
      context: .
      args:
        FROM_IMAGE: "golang:1.25"
    ports:
      - 8080
    depends_on:
      - conjur
    volumes:
      - ./output:/conjur-api-go/output
    environment:
      CONJUR_DATA_KEY:
      CONJUR_APPLIANCE_URL: http://conjur
      CONJUR_ACCOUNT: conjur
      CONJUR_AUTHN_LOGIN: admin
      CONJUR_AUTHN_API_KEY:
      GO_VERSION:
    # See note on test-1.26 networks above.
    networks:
      - default
      - conjur

  dev:
    build:
      context: .
      args:
        FROM_IMAGE: "golang:1.25"
    ports:
      - 8080
    depends_on:
      - conjur
    volumes:
      - .:/conjur-api-go
    environment:
      CONJUR_DATA_KEY:
      CONJUR_APPLIANCE_URL: http://conjur
      CONJUR_ACCOUNT: conjur
      CONJUR_AUTHN_LOGIN: admin
      CONJUR_AUTHN_API_KEY:
    entrypoint: sleep
    command: infinity

  mock-jwt-server:
    image: cyberark/mock-jwt-server:latest
    ports:
      - 8080
    environment:
      ISSUER: "jwt-server"
      AUDIENCE: "conjur"
      SUBJECT: "test-workload"
      EMAIL: "workload@example.com"

  # Enterprise appliance — only started when the "cert" profile is active
  # (i.e. when TEST_CERT=true and setup-cert-auth.sh is invoked from test.sh).
  # The appliance image is self-contained (embedded postgres); no separate DB needed.
  #
  # registry.tld is the standard CyberArk private registry hostname. All developers
  # are expected to have it mapped in /etc/hosts (or local DNS).
  conjur-leader:
    image: registry.tld/conjur-appliance:${APPLIANCE_TAG:-5.0-stable}
    hostname: conjur-leader-1.mycompany.local
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
      - no-new-privileges:true
    environment:
      CONJUR_LOG_LEVEL: debug
      CONJUR_HOSTNAME: conjur-leader-1.mycompany.local
      CONJUR_ACCOUNT: conjur
      # kics-scan ignore-line
      CONJUR_ADMIN_PASSWORD: ${CONJUR_ADMIN_PASSWORD:-MySecretP@ss1}
    networks:
      conjur:
        aliases:
          - conjur-leader-1.mycompany.local
    profiles:
      - cert

# The 'conjur' network exists solely for cert-auth (Enterprise appliance) tests.
# conjur-leader uses a fixed FQDN hostname (conjur-leader-1.mycompany.local) that
# must match the TLS cert baked in by 'evoke configure master'. Because that FQDN
# won't resolve on the default network, conjur-leader is placed here with a
# matching alias, and the test services join both networks.
# Without TEST_CERT=true this network is created but no service uses it.
networks:
  conjur:
    driver: bridge
